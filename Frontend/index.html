<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Chiropractic Studio - Chat Widget</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #0078d4;
        --primary-dark: #005a9e;
        --primary-light: #e7f3ff;
        --text-dark: #1a1a1a;
        --text-mid: #444;
        --text-light: #888;
        --border: #e8e8e8;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
        --radius: 16px;
        --success: #22c55e;
        --success-light: #f0fdf4;
        --success-border: #86efac;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0f0f0;
        min-height: 100vh;
      }

      /* ── Launcher ── */
      .launcher {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: 0 4px 16px rgba(0, 120, 212, 0.35);
        transition: all 0.25s ease;
        z-index: 1001;
      }
      .launcher:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }
      .launcher.open {
        background: #555;
      }

      /* ── Widget ── */
      .widget {
        position: fixed;
        bottom: 92px;
        right: 24px;
        width: 390px;
        height: 580px;
        background: white;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        transform: translateY(16px) scale(0.97);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000;
      }
      .widget.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0) scale(1);
      }

      /* ── Header ── */
      .w-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 14px;
        border-bottom: 1px solid var(--border);
        background: white;
        flex-shrink: 0;
      }
      .hbtn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: #888;
        font-size: 13px;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .hbtn:hover {
        background: #f2f2f2;
        color: #333;
      }
      .hlogo {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #4fc3f7 0%, #0078d4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 17px;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 120, 212, 0.2);
      }
      .htitle {
        flex: 1;
      }
      .htitle strong {
        display: block;
        font-size: 14.5px;
        font-weight: 600;
        color: var(--text-dark);
      }
      .htitle span {
        font-size: 11px;
        color: #aaa;
      }

      /* ── Screen containers ── */
      .screen {
        flex: 1;
        display: none;
        flex-direction: column;
        overflow: hidden;
      }
      .screen.active {
        display: flex;
      }

      /* ── WELCOME ── */
      #sWelcome {
        background: white;
      }
      .w-body {
        flex: 1;
        padding: 28px 22px 16px;
        overflow-y: auto;
      }
      .w-how {
        text-align: center;
        font-size: 13px;
        color: var(--text-light);
        margin-bottom: 22px;
      }
      .greeting-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        animation: fadeUp 0.4s ease both;
      }
      .g-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4fc3f7 0%, #0078d4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 15px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .g-bubble {
        background: #f2f2f2;
        border-radius: 18px 18px 18px 4px;
        padding: 12px 15px;
        font-size: 14px;
        color: var(--text-dark);
        line-height: 1.5;
        max-width: 255px;
      }
      .g-meta {
        font-size: 11px;
        color: var(--text-light);
        margin-top: 5px;
        padding-left: 1px;
      }

      .w-actions {
        flex-shrink: 0;
        padding: 14px 22px 22px;
        display: flex;
        gap: 10px;
        justify-content: center;
        border-top: 1px solid var(--border);
      }
      .pill-btn {
        padding: 10px 20px;
        border-radius: 999px;
        border: 1.5px solid var(--border);
        background: white;
        color: var(--primary);
        font-size: 13.5px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: inherit;
      }
      .pill-btn:hover {
        background: var(--primary-light);
        border-color: var(--primary);
        transform: translateY(-1px);
        box-shadow: 0 3px 10px rgba(0, 120, 212, 0.12);
      }
      .pill-btn:active {
        transform: translateY(0);
      }

      /* ── FORM ── */
      #sForm {
        padding: 28px 24px 20px;
        overflow-y: auto;
        background: white;
      }
      .f-title {
        font-size: 17px;
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 6px;
      }
      .f-sub {
        font-size: 13px;
        color: var(--text-light);
        margin-bottom: 22px;
        line-height: 1.5;
      }
      .f-group {
        margin-bottom: 17px;
      }
      .f-label {
        display: block;
        font-size: 12.5px;
        font-weight: 500;
        color: var(--text-mid);
        margin-bottom: 7px;
      }
      .f-inp {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        color: var(--text-dark);
        font-family: inherit;
        background: #fafafa;
      }
      .f-inp:focus {
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.08);
      }
      .f-inp::placeholder {
        color: #bbb;
      }
      .f-inp.err {
        border-color: #e74c3c;
      }
      .f-err {
        font-size: 12px;
        color: #e74c3c;
        margin-top: 5px;
        display: none;
      }
      .f-err.show {
        display: block;
      }
      .f-cta {
        width: 100%;
        padding: 13px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: inherit;
        margin-top: 4px;
      }
      .f-cta:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(0, 120, 212, 0.25);
      }
      .f-cta:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .f-back {
        width: 100%;
        padding: 11px;
        background: transparent;
        color: var(--text-light);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        margin-top: 8px;
      }
      .f-back:hover {
        background: #f5f5f5;
        color: var(--text-dark);
      }

      /* ── Inline field submit button states ── */
      .if-submit-btn {
        width: 40px;
        height: 40px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .if-submit-btn:hover:not(:disabled) {
        background: var(--primary-dark);
      }
      .if-submit-btn:disabled {
        cursor: not-allowed;
      }

      /* Loading spinner inside button */
      .if-submit-btn .btn-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        display: none;
        position: absolute;
      }
      .if-submit-btn .btn-icon {
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      .if-submit-btn .btn-tick {
        display: none;
        position: absolute;
        font-size: 17px;
        transform: scale(0);
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* States */
      .if-submit-btn.loading {
        background: var(--primary) !important;
      }
      .if-submit-btn.loading .btn-icon {
        opacity: 0;
        transform: scale(0.5);
      }
      .if-submit-btn.loading .btn-spinner {
        display: block;
      }

      .if-submit-btn.success {
        background: var(--success) !important;
      }
      .if-submit-btn.success .btn-icon {
        opacity: 0;
        transform: scale(0.5);
      }
      .if-submit-btn.success .btn-spinner {
        display: none;
      }
      .if-submit-btn.success .btn-tick {
        display: flex;
        transform: scale(1);
      }

      /* Input success state */
      .if-input-success {
        border-color: var(--success) !important;
        background: var(--success-light) !important;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1) !important;
      }

      /* Success field card glow */
      @keyframes successPulse {
        0% {
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        50% {
          box-shadow: 0 2px 20px rgba(34, 197, 94, 0.25);
        }
        100% {
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
      }
      .field-success-glow {
        animation: successPulse 0.6s ease;
      }

      /* ── Slots overlay page ── */
      .slots-overlay {
        position: absolute;
        inset: 0;
        background: white;
        z-index: 100;
        display: flex;
        flex-direction: column;
        animation: fadeUp 0.25s ease both;
      }
      .slots-overlay-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 14px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .slots-overlay-header button {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: #888;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        transition: background 0.2s;
      }
      .slots-overlay-header button:hover {
        background: #f2f2f2;
        color: #333;
      }
      .slots-overlay-header strong {
        font-size: 14px;
        color: var(--text-dark);
      }
      .slots-overlay-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .slots-overlay-body::-webkit-scrollbar {
        width: 4px;
      }
      .slots-overlay-body::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 2px;
      }

      /* ── PRACTITIONER AUTOCOMPLETE ── */
      .pract-wrap {
        position: relative;
      }
      .pract-wrap .f-inp,
      .pract-wrap input {
        padding-right: 36px;
      }
      .pract-clear {
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ddd;
        border: none;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 11px;
        transition: background 0.2s;
      }
      .pract-clear:hover {
        background: #bbb;
        color: #333;
      }
      .pract-clear.show {
        display: flex;
      }
      .pract-spinner {
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        display: none;
        border: 2px solid #ddd;
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      .pract-spinner.show {
        display: block;
      }
      @keyframes spin {
        to {
          transform: translateY(-50%) rotate(360deg);
        }
      }
      .pract-dropdown {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: white;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        z-index: 999;
        max-height: 180px;
        overflow-y: auto;
        display: none;
      }
      .pract-dropdown.open {
        display: block;
        animation: fadeUp 0.15s ease both;
      }
      .pract-dropdown::-webkit-scrollbar {
        width: 4px;
      }
      .pract-dropdown::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 2px;
      }
      .pract-item {
        padding: 10px 14px;
        font-size: 13.5px;
        color: var(--text-dark);
        cursor: pointer;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pract-item:hover,
      .pract-item.active {
        background: var(--primary-light);
        color: var(--primary);
      }
      .pract-item i {
        font-size: 12px;
        color: var(--text-light);
      }
      .pract-item:hover i,
      .pract-item.active i {
        color: var(--primary);
      }
      .pract-empty {
        padding: 12px 14px;
        font-size: 13px;
        color: var(--text-light);
        text-align: center;
        font-style: italic;
      }
      .pract-badge {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        background: var(--primary-light);
        border: 1.5px solid var(--primary);
        border-radius: 8px;
        font-size: 13px;
        color: var(--primary);
        font-weight: 500;
        margin-top: 6px;
      }
      .pract-badge.show {
        display: flex;
      }
      .pract-badge-x {
        margin-left: auto;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--primary);
        font-size: 13px;
        padding: 0 2px;
      }
      .pract-badge-x:hover {
        color: var(--primary-dark);
      }

      /* ── CHAT ── */
      #sChat {
        display: none;
        flex-direction: column;
      }
      #sChat.active {
        display: flex;
      }

      .msgs {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        background: #f9f9f9;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msgs::-webkit-scrollbar {
        width: 5px;
      }
      .msgs::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 3px;
      }

      .msg {
        display: flex;
        gap: 8px;
        animation: fadeUp 0.25s ease both;
      }
      .msg.bot {
        align-items: flex-start;
      }
      .msg.user {
        align-items: flex-end;
        flex-direction: row-reverse;
      }
      .m-av {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
      }
      .msg.bot .m-av {
        background: linear-gradient(135deg, #4fc3f7, #0078d4);
        color: white;
      }
      .msg.user .m-av {
        background: var(--primary);
        color: white;
      }
      .m-body {
        max-width: 72%;
      }
      .m-bubble {
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 13.5px;
        line-height: 1.5;
        word-wrap: break-word;
      }
      .msg.bot .m-bubble {
        background: white;
        color: var(--text-dark);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg.user .m-bubble {
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 4px;
      }
      .m-time {
        font-size: 10.5px;
        color: var(--text-light);
        margin-top: 4px;
        padding: 0 2px;
      }

      .typing-row {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 12px 14px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #aaa;
        animation: blink 1.4s infinite ease-in-out;
      }
      .dot:nth-child(1) {
        animation-delay: -0.32s;
      }
      .dot:nth-child(2) {
        animation-delay: -0.16s;
      }

      .opts {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }
      .opt {
        padding: 11px 24px;
        background: var(--primary);
        border: none;
        border-radius: 999px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        color: white;
        box-shadow: 0 2px 6px rgba(0, 120, 212, 0.3);
      }
      .opt:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0, 120, 212, 0.4);
      }
      .opt:active {
        transform: translateY(0);
      }

      .no-slots {
        background: #fff8e1;
        border: 1px solid #ffd54f;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: #7a5c00;
      }

      .chat-bar {
        padding: 13px 15px;
        border-top: 1px solid var(--border);
        background: white;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }
      .c-inp {
        flex: 1;
        padding: 10px 15px;
        border: 1.5px solid var(--border);
        border-radius: 999px;
        font-size: 13.5px;
        outline: none;
        transition: border-color 0.2s;
        background: #fafafa;
        font-family: inherit;
        color: var(--text-dark);
      }
      .c-inp:focus {
        border-color: var(--primary);
        background: white;
      }
      .c-inp:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .send {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .send:hover {
        background: var(--primary-dark);
        transform: scale(1.05);
      }
      .send:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      /* ── Overlay ── */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(2px);
        z-index: 999;
        display: none;
      }
      .overlay.active {
        display: block;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          transform: scale(0.8);
          opacity: 0.5;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes tickPop {
        0% {
          transform: scale(0) rotate(-10deg);
        }
        60% {
          transform: scale(1.2) rotate(3deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
        }
      }

      @media (max-width: 480px) {
        .widget {
          width: calc(100vw - 32px);
          height: calc(100vh - 120px);
          right: 16px;
          bottom: 90px;
        }
        .launcher {
          right: 16px;
          bottom: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <button class="launcher" id="launcher">
      <i class="fas fa-comment-dots"></i>
    </button>

    <div class="widget" id="widget">
      <!-- Header -->
      <div class="w-header">
        <button class="hbtn" id="hBack" style="display: none" title="Back">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="hlogo"><i class="fas fa-hand-holding-medical"></i></div>
        <div class="htitle">
          <strong>One Chiropractic Studio</strong>
          <span>The team can also help</span>
        </div>
        <button class="hbtn" title="Options">
          <i class="fas fa-ellipsis-h"></i>
        </button>
        <button class="hbtn" id="hClose" title="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- Screen: Welcome -->
      <div class="screen active" id="sWelcome">
        <div class="w-body">
          <div class="w-how">How can we help?</div>
          <div class="greeting-row">
            <div class="g-avatar"><i class="fas fa-robot"></i></div>
            <div>
              <div class="g-bubble">Hello 👋 How can we help you today?</div>
              <div class="g-meta">
                One Chiro Studio &bull; AI Agent &bull; Just now
              </div>
            </div>
          </div>
        </div>
        <div class="w-actions">
          <button class="pill-btn" id="btnChat">Chat With Us</button>
          <button class="pill-btn" id="btnSchedule">
            Schedule an Appointment
          </button>
        </div>
      </div>

      <!-- Screen: Form -->
      <div class="screen" id="sForm">
        <div class="f-title">Let's get started! 👋</div>
        <div class="f-sub">
          Please provide your details to book an appointment.
        </div>
        <form id="bookForm">
          <div class="f-group">
            <label class="f-label" for="fEmail">Your email address *</label>
            <input
              type="email"
              id="fEmail"
              class="f-inp"
              placeholder="email@example.com"
            />
            <div class="f-err" id="fEmailErr">
              Please enter a valid email address.
            </div>
          </div>
          <div class="f-group">
            <label class="f-label" for="fPract" style="color: #aaa"
              >Preferred practitioner
              <em style="font-style: normal; font-weight: 400"
                >(optional)</em
              ></label
            >
            <div class="pract-wrap">
              <input
                type="text"
                id="fPract"
                class="f-inp"
                placeholder="Search by name…"
                autocomplete="off"
              />
              <div class="pract-spinner" id="practSpinner"></div>
              <button class="pract-clear" id="practClear" type="button">
                <i class="fas fa-times"></i>
              </button>
              <div class="pract-dropdown" id="practDropdown"></div>
            </div>
            <div class="pract-badge" id="practBadge">
              <i class="fas fa-user-md"></i>
              <span id="practBadgeText"></span>
              <button class="pract-badge-x" id="practBadgeX" type="button">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="f-err" id="fPractErr">
              Please select a practitioner from the list.
            </div>
          </div>
          <button type="submit" class="f-cta" id="fSubmit">
            Continue <i class="fas fa-arrow-right"></i>
          </button>
          <button type="button" class="f-back" id="fBack">
            <i class="fas fa-arrow-left"></i> Back
          </button>
        </form>
      </div>

      <!-- Screen: Chat -->
      <div class="screen" id="sChat">
        <div class="msgs" id="msgs"></div>
        <div class="chat-bar">
          <input
            type="text"
            class="c-inp"
            id="cInp"
            placeholder="Type your message…"
            autocomplete="off"
          />
          <button class="send" id="cSend">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const launcher = $("launcher"),
        overlay = $("overlay"),
        widget = $("widget");
      const hBack = $("hBack"),
        hClose = $("hClose");
      const sWelcome = $("sWelcome"),
        sForm = $("sForm"),
        sChat = $("sChat");
      const btnChat = $("btnChat"),
        btnSchedule = $("btnSchedule");
      const bookForm = $("bookForm"),
        fEmail = $("fEmail"),
        fPract = $("fPract");
      const fEmailErr = $("fEmailErr"),
        fPractErr = $("fPractErr"),
        fSubmit = $("fSubmit");
      const fBack = $("fBack"),
        msgs = $("msgs"),
        cInp = $("cInp"),
        cSend = $("cSend");
      const practSpinner = $("practSpinner"),
        practClear = $("practClear");
      const practDropdown = $("practDropdown"),
        practBadge = $("practBadge");
      const practBadgeText = $("practBadgeText"),
        practBadgeX = $("practBadgeX");

      const API = "http://127.0.0.1:3000/api/chat";
      let SID = crypto.randomUUID();

      // ── chatMode tracks which flow the user is in ──
      // "general" → Chat With Us: free Q&A, no patient verification required
      // "booking" → Schedule an Appointment: full booking flow with verification
      let chatMode = "general";

      let open = false,
        busy = false,
        cur = "welcome";
      let bs = {
        patientId: null,
        practitionerId: null,
        locationId: null,
        appointmentTypeId: null,
        selectedSlot: null,
      };
      let curOpts = null;

      let selectedPract = null;
      let practDebounce = null;
      let practHighlight = -1;
      const SEARCH_API = "http://127.0.0.1:3000/api/practitioners/search";

      // ══════════════════════════════════════════════════════════════════════
      // BUTTON ANIMATION HELPERS
      // ══════════════════════════════════════════════════════════════════════

      function createAnimatedBtn(id) {
        const btn = document.getElementById(id);
        if (!btn) return null;
        btn.classList.add("if-submit-btn");
        btn.innerHTML = `
          <span class="btn-icon"><i class="fas fa-arrow-right"></i></span>
          <div class="btn-spinner"></div>
          <span class="btn-tick"><i class="fas fa-check"></i></span>
        `;
        return {
          el: btn,
          setLoading() {
            btn.disabled = true;
            btn.classList.remove("success");
            btn.classList.add("loading");
          },
          setSuccess() {
            btn.classList.remove("loading");
            btn.classList.add("success");
            const tick = btn.querySelector(".btn-tick");
            tick.style.animation = "none";
            tick.offsetHeight;
            tick.style.animation =
              "tickPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both";
          },
          reset() {
            btn.disabled = false;
            btn.classList.remove("loading", "success");
          },
        };
      }

      function setInputSuccess(input) {
        input.classList.add("if-input-success");
        input.addEventListener("focus", () => {}, { once: true });
      }

      async function submitFieldWithAnimation(
        input,
        animBtn,
        card,
        onComplete,
      ) {
        animBtn.setLoading();
        await new Promise((r) => setTimeout(r, 200));
        animBtn.setSuccess();
        setInputSuccess(input);
        card.classList.add("field-success-glow");
        await new Promise((r) => setTimeout(r, 400));
        onComplete();
      }

      // ══════════════════════════════════════════════════════════════════════
      // AUTOCOMPLETE
      // ══════════════════════════════════════════════════════════════════════
      async function searchPractitioners(q) {
        try {
          const r = await fetch(`${SEARCH_API}?q=${encodeURIComponent(q)}`);
          if (!r.ok) throw new Error("fetch failed");
          const data = await r.json();
          return data.practitioners ?? [];
        } catch {
          return [];
        }
      }

      function renderDropdown(results, dropdown) {
        dropdown.innerHTML = "";
        practHighlight = -1;
        if (!results.length) {
          dropdown.innerHTML =
            '<div class="pract-empty">No practitioners found</div>';
          dropdown.classList.add("open");
          return;
        }
        results.forEach((p) => {
          const d = document.createElement("div");
          d.className = "pract-item";
          d.innerHTML = '<i class="fas fa-user-md"></i> ' + p.name;
          d.addEventListener("mousedown", (e) => {
            e.preventDefault();
            selectPract(p);
          });
          dropdown.appendChild(d);
        });
        dropdown.classList.add("open");
      }

      function closeDropdown(dropdown) {
        if (dropdown) dropdown.classList.remove("open");
        practHighlight = -1;
      }

      function selectPract(p) {
        selectedPract = p;
        fPract.value = "";
        fPract.placeholder = "Search by name…";
        practBadgeText.textContent = p.name;
        practBadge.classList.add("show");
        practClear.classList.remove("show");
        closeDropdown(practDropdown);
        fPractErr.classList.remove("show");
      }

      function clearPract() {
        selectedPract = null;
        fPract.value = "";
        practBadge.classList.remove("show");
        practClear.classList.remove("show");
        closeDropdown(practDropdown);
      }

      practBadgeX.addEventListener("click", () => {
        clearPract();
        fPract.focus();
      });

      fPract.addEventListener("input", async () => {
        const q = fPract.value.trim();
        practClear.classList.toggle("show", q.length > 0 && !selectedPract);
        selectedPract = null;
        practBadge.classList.remove("show");
        clearTimeout(practDebounce);
        if (q.length < 1) {
          closeDropdown(practDropdown);
          return;
        }
        practDebounce = setTimeout(async () => {
          practSpinner.classList.add("show");
          practClear.classList.remove("show");
          const results = await searchPractitioners(q);
          practSpinner.classList.remove("show");
          practClear.classList.toggle("show", q.length > 0);
          renderDropdown(results, practDropdown);
        }, 300);
      });

      practClear.addEventListener("click", () => {
        clearPract();
        fPract.focus();
      });

      fPract.addEventListener("keydown", (e) => {
        const items = practDropdown.querySelectorAll(".pract-item");
        if (!practDropdown.classList.contains("open") || !items.length) return;
        if (e.key === "ArrowDown") {
          e.preventDefault();
          practHighlight = Math.min(practHighlight + 1, items.length - 1);
          items.forEach((el, i) =>
            el.classList.toggle("active", i === practHighlight),
          );
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          practHighlight = Math.max(practHighlight - 1, 0);
          items.forEach((el, i) =>
            el.classList.toggle("active", i === practHighlight),
          );
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (practHighlight >= 0)
            items[practHighlight].dispatchEvent(new Event("mousedown"));
        } else if (e.key === "Escape") {
          closeDropdown(practDropdown);
        }
      });

      fPract.addEventListener("blur", () =>
        setTimeout(() => closeDropdown(practDropdown), 150),
      );
      fPract.addEventListener("focus", async () => {
        const q = fPract.value.trim();
        if (q) {
          practSpinner.classList.add("show");
          const results = await searchPractitioners(q);
          practSpinner.classList.remove("show");
          renderDropdown(results, practDropdown);
        }
      });

      // ── Open/Close ──
      function openW() {
        open = true;
        widget.classList.add("active");
        overlay.classList.add("active");
        launcher.classList.add("open");
        launcher.innerHTML = '<i class="fas fa-times"></i>';
        go("welcome");
      }
      function closeW() {
        open = false;
        widget.classList.remove("active");
        overlay.classList.remove("active");
        launcher.classList.remove("open");
        resetBot();
        launcher.innerHTML = '<i class="fas fa-comment-dots"></i>';
      }
      launcher.addEventListener("click", () => (open ? closeW() : openW()));
      overlay.addEventListener("click", closeW);
      hClose.addEventListener("click", closeW);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && open) closeW();
      });

      // ── Screen routing ──
      function go(name) {
        cur = name;
        sWelcome.classList.toggle("active", name === "welcome");
        sForm.classList.toggle("active", name === "form");
        sChat.classList.toggle("active", name === "chat");
        hBack.style.display = name === "welcome" ? "none" : "flex";
        if (name === "form") fEmail.focus();
        if (name === "chat") cInp.focus();
      }

      function resetBot() {
        SID = crypto.randomUUID();
        msgs.innerHTML = "";
        bs = {
          patientId: null,
          practitionerId: null,
          locationId: null,
          appointmentTypeId: null,
          selectedSlot: null,
        };
        curOpts = null;
        busy = false;
        chatMode = "general"; // reset to default on close/back
        cInp.disabled = false;
        cSend.disabled = false;
        fSubmit.disabled = false;
        document.querySelector(".chat-bar").style.display = "flex";
        removeTyping();
        clearPract();
        fEmail.value = "";
        fEmailErr.classList.remove("show");
        fEmail.classList.remove("err");
        fPractErr.classList.remove("show");
      }

      hBack.addEventListener("click", () => {
        resetBot();
        go("welcome");
      });
      fBack.addEventListener("click", () => {
        resetBot();
        go("welcome");
      });

      // ── Welcome buttons ──
      const WELCOME_MSG = `Welcome to One Chiropractic Studio! 🏥\n\nWe're a network of chiropractic clinics across the Netherlands with locations in Utrecht, Amsterdam, Rotterdam, The Hague, Haarlem, Arnhem, Gouda, and Amersfoort.\n\nOur Services:\n• ONE Adjustment - Regular chiropractic adjustments\n• Initial Assessment - Comprehensive first visit evaluation\n\nWhy Choose Us:\n✓ Experienced practitioners\n✓ Modern facilities\n✓ Convenient locations\n✓ Easy online booking\n\nWould you like to schedule an appointment, or do you have any questions?`;

      // "Chat With Us" → general mode, no verification, free Q&A
      btnChat.addEventListener("click", () => {
        chatMode = "general";
        go("chat");
        document.querySelector(".chat-bar").style.display = "flex";
        addMsg("bot", "Hello 👋 How can we help you today?");
        addMsg("user", "Chat With Us");
        setBusy(true);
        showTyping();
        setTimeout(() => {
          removeTyping();
          setBusy(false);
          addMsg("bot", WELCOME_MSG);
        }, 1000);
      });

      // "Schedule an Appointment" → booking mode, full verification flow
      // btnSchedule.addEventListener("click", () => {
      //   chatMode = "booking";
      //   go("chat");
      //   addMsg("bot", "Hello 👋 How can we help you today?");
      //   addMsg("user", "Schedule an Appointment");
      //   setBusy(true);
      //   showTyping();
      //   document.querySelector(".chat-bar").style.display = "none";
      //   setTimeout(() => {
      //     removeTyping();
      //     setBusy(false);
      //     addMsg(
      //       "bot",
      //       "Excellent! We're excited to help you book your appointment. 😊",
      //     );
      //     setTimeout(() => {
      //       addMsg("bot", "Great! Let's start with your first name.");
      //       renderInlineForm();
      //     }, 800);
      //   }, 1000);
      // });

      btnSchedule.addEventListener("click", () => {
        chatMode = "booking";
        go("chat");
        addMsg("bot", "Hello 👋 How can we help you today?");
        addMsg("user", "Schedule an Appointment");
        setBusy(true);
        showTyping();
        document.querySelector(".chat-bar").style.display = "none";
        setTimeout(() => {
          removeTyping();
          setBusy(false);
          addMsg(
            "bot",
            "Excellent! We're excited to help you book your appointment. 😊",
          );
          setTimeout(() => {
            addMsg("bot", "First, please select your preferred location:");
            renderLocationStep();
          }, 800);
        }, 1000);
      });

      // ── Form submit (legacy form path, always booking mode) ──
      bookForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = fEmail.value.trim();
        let ok = true;
        if (!/^[\w.%+-]+@[\w.-]+\.[a-zA-Z]{2,}$/.test(email)) {
          fEmailErr.classList.add("show");
          fEmail.classList.add("err");
          fEmail.focus();
          ok = false;
        }
        if (ok && fPract.value.trim() && !selectedPract) {
          fPractErr.classList.add("show");
          fPract.focus();
          ok = false;
        }
        if (!ok) return;
        chatMode = "booking";
        const practName = selectedPract ? selectedPract.name : null;
        const msg = practName
          ? `I want to book an appointment with ${practName} and my email is ${email}`
          : `I want to book an appointment and my email is ${email}`;
        go("chat");
        toBackend(msg);
      });

      fEmail.addEventListener("input", () => {
        fEmailErr.classList.remove("show");
        fEmail.classList.remove("err");
      });

      // ── Chat input ──
      cSend.addEventListener("click", sendInput);
      cInp.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !busy) sendInput();
      });

      // Keywords that signal booking intent — only relevant in general mode
      const BOOKING_INTENT_PATTERNS = [
        /\bbook\b/i,
        /\bschedul/i,
        /\bappointment\b/i,
        /\breserv/i,
        /\bvisit\b/i,
        /\bsee a doctor\b/i,
        /\bcome in\b/i,
        /\bsign me up\b/i,
        /\bset up\b/i,
        /\bi want to (book|schedule|make|get)\b/i,
        /\bi\'d like to (book|schedule|make|get)\b/i,
        /\bcan i (book|schedule|make|get)\b/i,
        /\bi need (an appointment|a slot|to book|to schedule)\b/i,
      ];

      function detectsBookingIntent(text) {
        return BOOKING_INTENT_PATTERNS.some((re) => re.test(text));
      }

      function sendInput() {
        const m = cInp.value.trim();
        if (!m || busy) return;
        cInp.value = "";

        // In general mode: if the user expresses booking intent,
        // transition smoothly into the booking flow
        // if (chatMode === "general" && detectsBookingIntent(m)) {
        //   chatMode = "booking"; // upgrade to booking mode
        //   addMsg("user", m);
        //   addMsg("bot", "Of course! Let me get your appointment set up. 😊");
        //   setTimeout(() => {
        //     document.querySelector(".chat-bar").style.display = "none";
        //     setTimeout(() => {
        //       addMsg("bot", "Let\'s start with your first name.");
        //       renderInlineForm();
        //     }, 600);
        //   }, 500);
        //   return;
        // }

        if (chatMode === "general" && detectsBookingIntent(m)) {
          chatMode = "booking";
          addMsg("user", m);
          addMsg("bot", "Of course! Let me get your appointment set up. 😊");
          setTimeout(() => {
            document.querySelector(".chat-bar").style.display = "none";
            setTimeout(() => {
              addMsg("bot", "First, please select your preferred location:");
              renderLocationStep();
            }, 600);
          }, 500);
          return;
        }

        addMsg("user", m);
        toBackend(m);
      }

      // ══════════════════════════════════════════════════════════════════════
      // API CALLS — chatMode is sent with every request so the backend
      // knows whether to enforce patient verification or not.
      // ══════════════════════════════════════════════════════════════════════
      async function toBackend(message) {
        setBusy(true);
        showTyping();
        try {
          const r = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sessionId: SID,
              message,
              bookingState: bs,
              mode: chatMode, // ← tells backend which mode we're in
              extra: null,
            }),
          });
          removeTyping();
          if (!r.ok) throw new Error("HTTP " + r.status);
          handleReply((await r.json()).reply);
        } catch {
          removeTyping();
          addMsg(
            "bot",
            "Sorry, I'm having trouble connecting. Please try again.",
          );
        } finally {
          setBusy(false);
        }
      }

      // async function sendSel(value, extra = null) {
      //   setBusy(true);
      //   showTyping();
      //   try {
      //     const r = await fetch(API, {
      //       method: "POST",
      //       headers: { "Content-Type": "application/json" },
      //       body: JSON.stringify({
      //         sessionId: SID,
      //         message: value,
      //         bookingState: bs,
      //         mode: chatMode, // ← tells backend which mode we're in
      //         extra,
      //       }),
      //     });
      //     removeTyping();
      //     if (!r.ok) throw new Error("HTTP " + r.status);
      //     handleReply((await r.json()).reply);
      //   } catch {
      //     removeTyping();
      //     addMsg("bot", "Error processing your selection.");
      //   } finally {
      //     setBusy(false);
      //   }
      // }

      async function sendSel(value, extra = null) {
        setBusy(true);
        showTyping();
        try {
          const r = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sessionId: SID,
              message: value,
              bookingState: bs,
              mode: chatMode,
              extra,
            }),
          });
          removeTyping();
          if (!r.ok) throw new Error("HTTP " + r.status);
          const data = await r.json();
          handleReply(data.reply);
        } catch {
          removeTyping();
          addMsg("bot", "Error processing your selection.");
        } finally {
          setBusy(false);
        }
      }

      function setBusy(v) {
        busy = v;
        cInp.disabled = v;
        cSend.disabled = v;
        fSubmit.disabled = v;
      }

      // ── Reply handler ──
      function handleReply(reply) {
        if (reply.type === "restart_booking" || reply.clearState) {
          bs = {
            patientId: null,
            practitionerId: null,
            locationId: null,
            appointmentTypeId: null,
            selectedSlot: null,
          };
          rmOpts();
        }
        if (reply.type === "clear_patient") bs.patientId = null;
        if (reply.type === "clear_practitioner" || reply.clearPractitioner) {
          Object.assign(bs, {
            practitionerId: null,
            locationId: null,
            appointmentTypeId: null,
            selectedSlot: null,
          });
          rmOpts();
        }
        if (reply.clearLocation) {
          Object.assign(bs, {
            locationId: null,
            appointmentTypeId: null,
            selectedSlot: null,
          });
          rmOpts();
        }
        if (reply.clearAppointmentType) {
          Object.assign(bs, { appointmentTypeId: null, selectedSlot: null });
          rmOpts();
        }
        if (reply.clearSlot) {
          bs.selectedSlot = null;
          rmOpts();
        }
        if (reply.patientId && !bs.patientId) bs.patientId = reply.patientId;
        if (reply.practitionerId && !bs.practitionerId)
          bs.practitionerId = reply.practitionerId;
        const isNoSlots =
          reply.type === "available_slots" && !reply.data?.length;
        if (reply.aiMessage) addMsg("bot", reply.aiMessage);
        // if (reply.aiMessage && !isNoSlots) addMsg("bot", reply.aiMessage);
        switch (reply.type) {
          case "practitioner_verified":
            if (reply.practitionerId) bs.practitionerId = reply.practitionerId;
            break;
          case "practitioners_list":
            if (reply.data?.length) renderPracts(reply.data);
            break;
          case "patient_verified":
            if (reply.patientId) bs.patientId = reply.patientId;
            break;
          case "locations_list":
            if (reply.data?.length) renderOpts("location", reply.data);
            break;
          // case "appointment_types_list":
          //   if (reply.data?.length) renderOpts("appointmentType", reply.data);
          //   break;
          // case "available_slots":
          //   if (reply.data?.length) renderSlots(reply.data);
          //   else if (reply.unavailableDates?.length)
          //     renderNoSlots(reply.unavailableDates);
          //   break;

          case "available_slots":
            if (reply.data?.length) {
              renderSlots(reply.data);
            } else {
              // addMsg("bot", "Would you like to try a different location?");
              // fetchAndRenderLocations();

              setTimeout(() => {
                renderNoSlotsChoice(!!bs.practitionerId);
              }, 400);
            }
            break;
          case "appointment_confirmed":
            bs = {
              patientId: null,
              practitionerId: null,
              locationId: null,
              appointmentTypeId: null,
              selectedSlot: null,
            };
            break;
          case "error":
            if (!reply.aiMessage)
              addMsg("bot", "❌ " + (reply.message || "Something went wrong."));
            break;
          default:
            if (!reply.aiMessage && reply.message) addMsg("bot", reply.message);
        }
      }

      // ── UI helpers ──
      function playNotificationSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.3);
        } catch {}
      }

          <div class="m-body">
            <div class="m-bubble">${esc(text)}</div>
            <div class="m-time">${t}</div>

        msgs.appendChild(d);
        scrollD();
        if (who === "bot") playNotificationSound();

      function renderSlots(slots) {
        const groups = {};
        const dateKeys = [];
        slots.forEach((s) => {
          const dd = new Date(s.start.replace(" ", "T"));
          const dateKey = dd.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
          });
          if (!groups[dateKey]) {
            groups[dateKey] = { dd, slots: [] };
            dateKeys.push(dateKey);
          }
          groups[dateKey].slots.push(s);
        });
        const previewSlots = groups[dateKeys[0]]?.slots.slice(0, 3) ?? [];
        const firstDd = groups[dateKeys[0]].dd;
        const card = document.createElement("div");
        card.style.cssText =
          "background:white;border:1.5px solid #e8e8e8;border-radius:14px;margin-top:8px;box-shadow:0 2px 12px rgba(0,0,0,0.07);width:100%";
        const cardHead = document.createElement("div");
        cardHead.style.cssText =
          "padding:12px 16px;border-bottom:1px solid #e8e8e8";
        cardHead.innerHTML = `<div style="font-size:13px;font-weight:600;color:#1a1a1a">${firstDd.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</div><div style="font-size:11px;color:#888;margin-top:2px">Select a time below</div>`;
        card.appendChild(cardHead);
        const slotList = document.createElement("div");
        slotList.style.cssText =
          "padding:10px 16px;display:flex;flex-direction:column;gap:8px";
        previewSlots.forEach((s) => {
          const dd = new Date(s.start.replace(" ", "T"));
          const timeLabel = dd.toLocaleTimeString("en-US", {
            hour: "numeric",
            minute: "2-digit",
          });
          const fullLabel = `${firstDd.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })} at ${timeLabel}`;
          const btn = document.createElement("button");
          btn.style.cssText =
            "width:100%;padding:11px 16px;border:1.5px solid #e8e8e8;border-radius:8px;background:white;font-size:14px;color:#1a1a1a;font-family:inherit;cursor:pointer;text-align:center;transition:all 0.15s";
          btn.textContent = timeLabel;
          btn.onmouseover = () => {
            btn.style.borderColor = "#0078d4";
            btn.style.color = "#0078d4";
            btn.style.background = "#e7f3ff";
          };
          btn.onmouseout = () => {
            btn.style.borderColor = "#e8e8e8";
            btn.style.color = "#1a1a1a";
            btn.style.background = "white";
          };
          btn.onclick = () => {
            addMsg("user", fullLabel);
            bs.selectedSlot = {
              id: s.id,
              practitionerId: s.practitionerId,
              start: s.start,
              end: s.end,
            };
            sendSel(`slot_${s.id}`, {
              practitionerId: s.practitionerId,
              start: s.start,
              end: s.end,
            });
            card.remove();
          };
          slotList.appendChild(btn);
        });
        card.appendChild(slotList);
        const remaining = slots.length - previewSlots.length;
        if (remaining > 0) {
          const moreBtn = document.createElement("button");
          moreBtn.style.cssText =
            "width:100%;padding:11px 16px;border:none;border-top:1px solid #e8e8e8;background:#f9f9f9;color:#0078d4;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:0 0 12px 12px";
          moreBtn.innerHTML = `<i class="fas fa-calendar-alt"></i> More slots`;
          moreBtn.onmouseover = () => (moreBtn.style.background = "#e7f3ff");
          moreBtn.onmouseout = () => (moreBtn.style.background = "#f9f9f9");
          moreBtn.onclick = () =>
            openSlotsOverlay(slots, groups, dateKeys, card);
          card.appendChild(moreBtn);
        }
        msgs.appendChild(card);
        scrollD();

      async function fetchAndRenderLocations() {
        bs.locationId = null;
        bs.appointmentTypeId = null;
        bs.selectedSlot = null;
        showTyping();
        let locations = LOCATIONS; // fallback
        try {
          const r = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sessionId: SID,
              message: "__GET_LOCATIONS__",
              bookingState: bs,
              mode: "booking",
              extra: null,
            }),
          });
          if (r.ok) {
            const data = await r.json();
            locations = data.reply?.data ?? LOCATIONS;
          }
        } catch {}
        removeTyping();
        renderOpts("location", locations);
      }

          const timesCol = document.createElement("div");
          timesCol.style.cssText =

          daySlots.forEach((s) => {
            const slotDd = new Date(s.start.replace(" ", "T"));
            const timeLabel = slotDd.toLocaleTimeString("en-US", {
              hour: "numeric",
              minute: "2-digit",

              btn.style.borderColor = "#e8e8e8";
              btn.style.color = "#1a1a1a";
              btn.style.background = "white";
            };
            btn.onclick = () => {
              addMsg("user", fullLabel);
              bs.selectedSlot = {
                id: s.id,
                practitionerId: s.practitionerId,
                start: s.start,
                end: s.end,
              };
              sendSel(`slot_${s.id}`, {

                end: s.end,

              ov.remove();
              sourceCard.remove();

            timesCol.appendChild(btn);

          row.appendChild(dateCol);
          row.appendChild(timesCol);
          body.appendChild(row);
        });
        ov.appendChild(body);
        widget.appendChild(ov);
        ov.querySelector("#ovBack").onclick = () => ov.remove();
      }

      // Step 1: Location buttons
      async function renderLocationStep() {
        // Show typing indicator while fetching
        showTyping();
        let locations = [];
        try {
          const r = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sessionId: SID,
              message: "__GET_LOCATIONS__",
              bookingState: bs,
              mode: "booking",
              extra: null,
            }),
          });
          if (r.ok) {
            const data = await r.json();
            locations = data.reply?.data ?? [];
          }
        } catch {
          // fall back to hardcoded list if backend fails
          locations = LOCATIONS;
        }
        removeTyping();

        const wrap = document.createElement("div");
        wrap.className = "opts";
        wrap.id = "locationStep";
        locations.forEach((loc) => {
          const b = document.createElement("button");
          b.className = "opt";
          b.textContent = loc.name;
          b.onclick = () => {
            bs.locationId = loc.id;
            addMsg("user", loc.name);
            wrap.remove();
            setTimeout(() => {
              addMsg(
                "bot",
                "Great! Now let's get your details. What's your first name?",
              );
              renderFirstNameField();
            }, 600);
          };
          wrap.appendChild(b);
        });
        msgs.appendChild(wrap);
        scrollD();
      }

      function makeFieldCard(id) {
        const card = document.createElement("div");
        card.id = id;
        card.style.cssText =
          "display:flex;flex-direction:column;gap:10px;margin:8px 0;padding:16px;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);animation:fadeUp 0.3s ease both;transition:box-shadow 0.3s";
        return card;
      }

      function makeFieldRow(
        labelText,
        inputId,
        type,
        placeholder,
        submitBtnId,
      ) {
        return `
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="font-size:13px;font-weight:500;color:#666">${labelText}</label>
      <div style="display:flex;gap:8px;position:relative">
        <input id="${inputId}" type="${type}" placeholder="${placeholder}"
          style="flex:1;padding:12px 14px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;
                 outline:none;font-family:inherit;background:white;color:#1a1a1a;transition:all 0.2s"
          onfocus="this.style.borderColor='#0078d4';this.style.boxShadow='0 0 0 3px rgba(0,120,212,0.1)'"
          onblur="if(!this.classList.contains('if-input-success')){this.style.borderColor='#e8e8e8';this.style.boxShadow='none'}" />
        <button id="${submitBtnId}" type="button"
          class="if-submit-btn"
          onmouseover="if(!this.disabled)this.style.background='#005a9e'"
          onmouseout="if(!this.classList.contains('success'))this.style.background='#0078d4'">
          <span class="btn-icon"><i class="fas fa-arrow-right"></i></span>
          <div class="btn-spinner"></div>
          <span class="btn-tick"><i class="fas fa-check"></i></span>
        </button>
      </div>
      <div id="${inputId}Err" style="font-size:12px;color:#e74c3c;display:none;margin-top:4px"></div>
    </div>`;
      }

      // Step 2: First Name
      function renderFirstNameField() {
        const card = makeFieldCard("firstNameField");
        card.innerHTML = makeFieldRow(
          "First Name",
          "ifFirstName",
          "text",
          "John",
          "ifFirstNameSubmit",
        );
        msgs.appendChild(card);
        scrollD();

        const input = $("ifFirstName");
        const btn = $("ifFirstNameSubmit");
        const errEl = $("ifFirstNameErr");

        setTimeout(() => input.focus(), 100);

        const submit = async () => {
          const val = input.value.trim();
          if (!val || val.length < 2) {
            errEl.textContent = "Please enter your first name";
            errEl.style.display = "block";
            input.style.borderColor = "#e74c3c";
            input.focus();
            return;
          }
          errEl.style.display = "none";
          input.disabled = true;
          btn.classList.add("loading");
          await new Promise((r) => setTimeout(r, 220));
          btn.classList.remove("loading");
          btn.classList.add("success");
          input.classList.add("if-input-success");
          card.style.boxShadow = "0 2px 16px rgba(34,197,94,0.18)";
          await new Promise((r) => setTimeout(r, 420));
          addMsg("user", val);
          card.remove();
          setTimeout(() => {
            addMsg("bot", "Great! What's your last name?");
            renderLastNameField(val);
          }, 600);
        };

        btn.addEventListener("click", submit);
        input.addEventListener("keypress", (e) => {
          if (e.key === "Enter") submit();
        });
        input.addEventListener("input", () => {
          errEl.style.display = "none";
          if (!input.classList.contains("if-input-success"))
            input.style.borderColor = "#e8e8e8";
        });
      }

      //     if (!input.classList.contains("if-input-success"))
      //       input.style.borderColor = "#e8e8e8";
      //   });
      // }

      // Step 4: Email — verifies patient on submit, then branches
      function renderEmailField(firstName, lastName) {
        console.log("firstName", firstName);
        const card = makeFieldCard("emailField");
        card.innerHTML = makeFieldRow(
          "Email",
          "ifEmail",
          "email",
          "email@example.com",
          "ifEmailSubmit",
        );
        msgs.appendChild(card);
        scrollD();

        const input = $("ifEmail");
        const btn = $("ifEmailSubmit");
        const errEl = $("ifEmailErr");

        setTimeout(() => input.focus(), 100);

        const submit = async () => {
          const val = input.value.trim();
          if (!/^[\w.%+-]+@[\w.-]+\.[a-zA-Z]{2,}$/.test(val)) {
            errEl.textContent = "Please enter a valid email address";
            errEl.style.display = "block";
            input.style.borderColor = "#e74c3c";
            input.focus();
            return;
          }
          errEl.style.display = "none";
          input.disabled = true;
          btn.classList.add("loading");

          // Call backend to verify patient while showing loader
          let patientResult = null;
          try {
            const r = await fetch(API, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                sessionId: SID,
                message: `verify_email:${val}`,
                bookingState: bs,
                mode: "booking",
                extra: { firstName, lastName, email: val },
              }),
            });
            if (r.ok) patientResult = (await r.json()).reply;
          } catch {
            // fall through — treat as unknown
          }

          btn.classList.remove("loading");
          btn.classList.add("success");
          input.classList.add("if-input-success");
          card.style.boxShadow = "0 2px 16px rgba(34,197,94,0.18)";
          await new Promise((r) => setTimeout(r, 420));
          addMsg("user", val);
          card.remove();

          // Store patientId if verified
          const isExisting = patientResult?.type === "patient_verified";
          const isNew = patientResult?.type === "patient_not_found";

          if (isExisting && patientResult.patientId) {
            bs.patientId = patientResult.patientId;
            if (patientResult.aiMessage) addMsg("bot", patientResult.aiMessage);
          }

          // For new patients, store the patientId from the response
          if (isNew && patientResult.patientId) {
            bs.patientId = patientResult.patientId;
          }

          setTimeout(() => {
            if (isExisting) {
              // Existing patient → show optional practitioner field
              addMsg(
                "bot",
                `Welcome back, ${firstName}! 👋 Do you have a preferred practitioner? (Optional — just click Continue to see all available slots)`,
              );
              renderPractitionerField(val, firstName, lastName);
            } else {
              // New patient → skip practitioner completely, go straight to slots with polite message
              const msg = `I want to book an appointment. My name is ${firstName} ${lastName} and my email is ${val}`;
              addMsg(
                "bot",
                `Thanks ${firstName}! 🙏 Please select from the available slots below for your initial assessment:`,
              );
              chatMode = "booking";
              toBackend(msg);
            }
          }, 600);
        };

        btn.addEventListener("click", submit);
        input.addEventListener("keypress", (e) => {
          if (e.key === "Enter") submit();
        });
        input.addEventListener("input", () => {
          errEl.style.display = "none";
          if (!input.classList.contains("if-input-success"))
            input.style.borderColor = "#e8e8e8";
        });
      }

      // Step 5: Practitioner (only shown for existing patients - optional)
      function renderPractitionerField(email, firstName, lastName) {
        let selectedInlinePract = null;
        let inlineDebounce = null;
        let inlineHighlight = -1;

        const practWrap = document.createElement("div");
        practWrap.id = "practField";
        practWrap.style.cssText =
          "display:flex;flex-direction:column;gap:10px;margin:8px 0;padding:16px;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);animation:fadeUp 0.3s ease both";

        practWrap.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="font-size:13px;font-weight:500;color:#666">Practitioner <span style="font-weight:400;font-size:12px;color:#888">(optional - skip to see all slots)</span></label>
      <div class="pract-wrap">
        <input id="ifPract" type="text" placeholder="Search by name…" autocomplete="off"
          style="width:100%;padding:12px 40px 12px 14px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;
                 outline:none;font-family:inherit;background:white;color:#1a1a1a;transition:all 0.2s"
          onfocus="this.style.borderColor='#0078d4';this.style.boxShadow='0 0 0 3px rgba(0,120,212,0.1)'"
          onblur="this.style.borderColor='#e8e8e8';this.style.boxShadow='none'" />
        <div class="pract-spinner" id="ifPractSpinner"></div>
        <button class="pract-clear" id="ifPractClear" type="button" style="display:none"><i class="fas fa-times"></i></button>
        <div class="pract-dropdown" id="ifPractDropdown"></div>
      </div>
      <div class="pract-badge" id="ifPractBadge" style="display:none">
        <i class="fas fa-user-md"></i>
        <span id="ifPractBadgeText"></span>
        <button class="pract-badge-x" id="ifPractBadgeX" type="button"><i class="fas fa-times"></i></button>
      </div>
      <div id="ifPractErr" style="font-size:12px;color:#e74c3c;display:none">Please select a practitioner from the list</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="ifSkipPractitioner"
        style="flex:1;padding:12px 20px;background:#f5f5f5;color:#666;border:none;border-radius:8px;
               font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
               display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s"
        onmouseover="this.style.background='#e8e8e8'"
        onmouseout="this.style.background='#f5f5f5'">
        Skip <i class="fas fa-arrow-right"></i>
      </button>
      <button id="ifFinalSubmit"
        style="flex:1;padding:12px 20px;background:#0078d4;color:white;border:none;border-radius:8px;
               font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
               display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s"
        onmouseover="this.style.background='#005a9e'"
        onmouseout="this.style.background='#0078d4'">
        Continue <i class="fas fa-arrow-right"></i>
      </button>
    </div>`;

        msgs.appendChild(practWrap);
        scrollD();

        const ifPract = $("ifPract");
        const ifPractSpinner = $("ifPractSpinner");
        const ifPractClear = $("ifPractClear");
        const ifPractDropdown = $("ifPractDropdown");
        const ifPractBadge = $("ifPractBadge");
        const ifPractBadgeText = $("ifPractBadgeText");
        const ifPractBadgeX = $("ifPractBadgeX");
        const ifPractErr = $("ifPractErr");
        const ifFinalSubmit = $("ifFinalSubmit");
        const ifSkipPractitioner = $("ifSkipPractitioner");

        setTimeout(() => ifPract.focus(), 100);

        ifPract.addEventListener("input", async () => {
          const q = ifPract.value.trim();
          ifPractClear.style.display =
            q.length > 0 && !selectedInlinePract ? "flex" : "none";
          selectedInlinePract = null;
          ifPractBadge.style.display = "none";
          clearTimeout(inlineDebounce);
          if (q.length < 1) {
            ifPractDropdown.classList.remove("open");
            return;
          }
          inlineDebounce = setTimeout(async () => {
            ifPractSpinner.classList.add("show");
            ifPractClear.style.display = "none";
            const results = await searchPractitioners(q);
            ifPractSpinner.classList.remove("show");
            ifPractClear.style.display = q.length > 0 ? "flex" : "none";
            renderInlineDropdown(results, ifPractDropdown, (p) => {
              selectedInlinePract = p;
              ifPract.value = "";
              ifPractBadgeText.textContent = p.name;
              ifPractBadge.style.display = "flex";
              ifPractClear.style.display = "none";
              ifPractDropdown.classList.remove("open");
              ifPractErr.style.display = "none";
            });
          }, 300);
        });

        ifPractClear.addEventListener("click", () => {
          selectedInlinePract = null;
          ifPract.value = "";
          ifPractBadge.style.display = "none";
          ifPractClear.style.display = "none";
          ifPractDropdown.classList.remove("open");
          ifPract.focus();
        });

        ifPractBadgeX.addEventListener("click", () => {
          selectedInlinePract = null;
          ifPract.value = "";
          ifPractBadge.style.display = "none";
          ifPractClear.style.display = "none";
          ifPract.focus();
        });

        ifPract.addEventListener("keydown", (e) => {
          const items = ifPractDropdown.querySelectorAll(".pract-item");
          if (!ifPractDropdown.classList.contains("open") || !items.length)
            return;
          if (e.key === "ArrowDown") {
            e.preventDefault();
            inlineHighlight = Math.min(inlineHighlight + 1, items.length - 1);
            items.forEach((el, i) =>
              el.classList.toggle("active", i === inlineHighlight),
            );
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            inlineHighlight = Math.max(inlineHighlight - 1, 0);
            items.forEach((el, i) =>
              el.classList.toggle("active", i === inlineHighlight),
            );
          } else if (e.key === "Enter") {
            e.preventDefault();
            if (inlineHighlight >= 0)
              items[inlineHighlight].dispatchEvent(new Event("mousedown"));
            else finalSubmit();
          } else if (e.key === "Escape") {
            ifPractDropdown.classList.remove("open");
          }
        });

        ifPract.addEventListener("blur", () =>
          setTimeout(() => ifPractDropdown.classList.remove("open"), 150),
        );

        // const finalSubmit = (skip = false) => {
        //   if (!skip && ifPract.value.trim() && !selectedInlinePract) {
        //     ifPractErr.style.display = "block";
        //     ifPract.style.borderColor = "#e74c3c";
        //     ifPract.focus();
        //     return;
        //   }

        //   const practName = selectedInlinePract
        //     ? selectedInlinePract.name
        //     : null;
        //   const msg = practName
        //     ? `I want to book an appointment with ${practName}. My name is ${firstName} ${lastName} and my email is ${email}`
        //     : `I want to book an appointment. My name is ${firstName} ${lastName} and my email is ${email}`;

        //   practWrap.remove();

        //   if (practName) {
        //     addMsg("user", `Practitioner: ${practName}`);
        //   } else {
        //     addMsg("user", "No practitioner preference");
        //   }

        //   chatMode = "booking";
        //   toBackend(msg);
        // };

        const finalSubmit = (skip = false) => {
          if (!skip && ifPract.value.trim() && !selectedInlinePract) {
            ifPractErr.style.display = "block";
            ifPract.style.borderColor = "#e74c3c";
            ifPract.focus();
            return;
          }

          const practName = selectedInlinePract
            ? selectedInlinePract.name
            : null;

          if (practName) {
            // Send practitioner selection as a system message
            addMsg("user", `Practitioner: ${practName}`);
            bs.practitionerId = selectedInlinePract.id;
            // Send the practitioner_* message directly
            sendSel(`practitioner_${selectedInlinePract.id}`);
          } else {
            // Skip practitioner - send booking message
            addMsg("user", "No practitioner preference");
            const msg = `I want to book an appointment. My name is ${firstName} ${lastName} and my email is ${email}`;
            chatMode = "booking";
            toBackend(msg);
          }

          practWrap.remove();
        };

        ifFinalSubmit.addEventListener("click", () => finalSubmit(false));
        ifSkipPractitioner.addEventListener("click", () => finalSubmit(true));
      }

      function renderInlineDropdown(results, dropdown, onSelect) {
        dropdown.innerHTML = "";
        if (!results.length) {
          dropdown.innerHTML =
            '<div class="pract-empty">No practitioners found</div>';
          dropdown.classList.add("open");
          return;
        }
        results.forEach((p) => {
          const d = document.createElement("div");
          d.className = "pract-item";
          d.innerHTML = '<i class="fas fa-user-md"></i> ' + p.name;
          d.addEventListener("mousedown", (e) => {
            e.preventDefault();
            onSelect(p);
          });
          dropdown.appendChild(d);
        });
        dropdown.classList.add("open");
      }

      function esc(t) {
        const el = document.createElement("div");
        el.textContent = t;
        return el.innerHTML.replace(/\n/g, "<br>");
      }
      function scrollD() {
        setTimeout(() => (msgs.scrollTop = msgs.scrollHeight), 80);
      }
    </script>
  </body>
</html>
